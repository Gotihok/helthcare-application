<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>

    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="Enter your email"
          [class.is-invalid]="f['email'].errors && f['email'].touched"
        />
        <div *ngIf="f['email'].errors && f['email'].touched" class="error-message">
          <small *ngIf="f['email'].errors['required']">Email is required</small>
          <small *ngIf="f['email'].errors['email']">Invalid email</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Enter your password"
          [class.is-invalid]="f['password'].errors && f['password'].touched"
        />
        <div *ngIf="f['password'].errors && f['password'].touched" class="error-message">
          <small *ngIf="f['password'].errors['required']">Password is required</small>
          <small *ngIf="f['password'].errors['minlength']">Min 6 characters</small>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="register-link">
      <p>No account? <a (click)="navigateToRegister()">Sign up</a></p>
    </div>
  </div>
</div>
