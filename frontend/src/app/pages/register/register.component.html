<div class="register-container">
  <div class="register-card">
    <h2>Sign Up</h2>

    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            id="firstName"
            type="text"
            formControlName="firstName"
            class="form-control"
            placeholder="First name"
            [class.is-invalid]="f['firstName'].errors && f['firstName'].touched"
          />
          <div *ngIf="f['firstName'].errors && f['firstName'].touched" class="error-message">
            <small *ngIf="f['firstName'].errors['required']">Required</small>
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            id="lastName"
            type="text"
            formControlName="lastName"
            class="form-control"
            placeholder="Last name"
            [class.is-invalid]="f['lastName'].errors && f['lastName'].touched"
          />
          <div *ngIf="f['lastName'].errors && f['lastName'].touched" class="error-message">
            <small *ngIf="f['lastName'].errors['required']">Required</small>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="your@email.com"
          [class.is-invalid]="f['email'].errors && f['email'].touched"
        />
        <div *ngIf="f['email'].errors && f['email'].touched" class="error-message">
          <small *ngIf="f['email'].errors['required']">Required</small>
          <small *ngIf="f['email'].errors['email']">Invalid email</small>
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone</label>
        <input
          id="phoneNumber"
          type="tel"
          formControlName="phoneNumber"
          class="form-control"
          placeholder="+48 123 456 789"
          [class.is-invalid]="f['phoneNumber'].errors && f['phoneNumber'].touched"
        />
        <div *ngIf="f['phoneNumber'].errors && f['phoneNumber'].touched" class="error-message">
          <small *ngIf="f['phoneNumber'].errors['required']">Required</small>
        </div>
      </div>

      <div class="form-group">
        <label for="birthDate">Birth Date</label>
        <input
          id="birthDate"
          type="date"
          formControlName="birthDate"
          class="form-control"
          [class.is-invalid]="f['birthDate'].errors && f['birthDate'].touched"
        />
        <div *ngIf="f['birthDate'].errors && f['birthDate'].touched" class="error-message">
          <small *ngIf="f['birthDate'].errors['required']">Required</small>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-control"
            placeholder="Min 8 characters"
            [class.is-invalid]="f['password'].errors && f['password'].touched"
          />
          <div *ngIf="f['password'].errors && f['password'].touched" class="error-message">
            <small *ngIf="f['password'].errors['required']">Required</small>
            <small *ngIf="f['password'].errors['minlength']">Min 8 chars</small>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            class="form-control"
            placeholder="Repeat password"
            [class.is-invalid]="f['confirmPassword'].errors && f['confirmPassword'].touched"
          />
          <div *ngIf="f['confirmPassword'].errors && f['confirmPassword'].touched" class="error-message">
            <small *ngIf="f['confirmPassword'].errors['required']">Required</small>
          </div>
        </div>
      </div>

      <div *ngIf="registerForm.errors?.['mismatch']" class="error-message">
        <small>Passwords don't match</small>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Sign Up' }}
      </button>
    </form>

    <div class="login-link">
      <p>Have an account? <a (click)="navigateToLogin()">Login</a></p>
    </div>
  </div>
</div>
